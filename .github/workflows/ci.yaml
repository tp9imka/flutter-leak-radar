name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: analyze · test (library packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter --version

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Constraint sync check
        run: ./tool/sync-constraints.sh --check

      # One root `pub get` resolves the whole pub workspace
      # (flutter_leak_radar + flutter_leak_radar_lint + the lint example).
      # This is the workspace-native alternative to `melos bootstrap`, which
      # cannot run a per-package `pub get` against workspace members.
      - name: Resolve workspace
        run: flutter pub get

      - name: Analyze flutter_leak_radar
        run: flutter analyze
        working-directory: packages/flutter_leak_radar

      - name: Analyze flutter_leak_radar_lint
        run: dart analyze
        working-directory: packages/flutter_leak_radar_lint

      - name: Test flutter_leak_radar
        run: flutter test
        working-directory: packages/flutter_leak_radar

      # Pure-Dart package: dart test (not flutter test) so custom_lint's
      # analyzer harness resolves the standalone Dart SDK.
      - name: Test flutter_leak_radar_lint
        run: dart test
        working-directory: packages/flutter_leak_radar_lint

      # leak_graph is pure Dart (retaining-path heap analyzer).
      - name: Analyze leak_graph
        run: dart analyze
        working-directory: packages/leak_graph

      - name: Test leak_graph
        run: dart test
        working-directory: packages/leak_graph

      # radar_trace is pure Dart (tracer framework core).
      - name: Analyze radar_trace
        run: dart analyze
        working-directory: packages/radar_trace

      - name: Test radar_trace
        run: dart test
        working-directory: packages/radar_trace

      - name: Analyze flutter_perf_radar
        run: flutter analyze
        working-directory: packages/flutter_perf_radar

      - name: Test flutter_perf_radar
        run: flutter test
        working-directory: packages/flutter_perf_radar

      - name: Analyze flutter_leak_radar_devtools
        run: flutter analyze
        working-directory: packages/flutter_leak_radar_devtools

      - name: Test flutter_leak_radar_devtools
        run: flutter test --platform chrome
        working-directory: packages/flutter_leak_radar_devtools

      - name: Analyze radarscope
        run: flutter analyze
        working-directory: packages/radarscope

      - name: Test radarscope
        run: flutter test
        working-directory: packages/radarscope

      - name: Analyze radar_ui
        run: flutter analyze
        working-directory: packages/radar_ui

      - name: Test radar_ui
        run: flutter test
        working-directory: packages/radar_ui

      # radar_native is pure Dart (native-heap model + module/diff analysis).
      - name: Analyze radar_native
        run: dart analyze
        working-directory: packages/radar_native

      - name: Test radar_native
        run: dart test
        working-directory: packages/radar_native

      # radar_native_host is pure Dart (Perfetto/trace_processor parser, adb +
      # heapprofd capture, and the native symbolization producer + CLI). Its
      # real-tool integration tests skip unless RADAR_* env vars are set.
      - name: Analyze radar_native_host
        run: dart analyze
        working-directory: packages/radar_native_host

      - name: Test radar_native_host
        run: dart test
        working-directory: packages/radar_native_host

      # radar_workbench is the shared portable analysis engine (VM tests).
      - name: Analyze radar_workbench
        run: flutter analyze
        working-directory: packages/radar_workbench

      - name: Test radar_workbench
        run: flutter test
        working-directory: packages/radar_workbench

      # radar_desktop is the desktop app; its widget tests run on the VM, and
      # its device/VM-Service integration tests skip unless RADAR_* env vars set.
      - name: Analyze radar_desktop
        run: flutter analyze
        working-directory: packages/radar_desktop

      - name: Test radar_desktop
        run: flutter test
        working-directory: packages/radar_desktop
