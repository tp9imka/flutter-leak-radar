name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get
        working-directory: packages/flutter_leak_radar_lint

      - name: Analyze
        run: dart analyze --fatal-infos
        working-directory: packages/flutter_leak_radar_lint

      - name: Test
        run: dart test
        working-directory: packages/flutter_leak_radar_lint

      - name: Install example dependencies
        run: dart pub get
        working-directory: packages/flutter_leak_radar_lint/example

      - name: Custom lint (dogfood)
        run: dart run custom_lint --working-directory example
        working-directory: packages/flutter_leak_radar_lint
