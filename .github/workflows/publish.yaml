name: Publish

# Automated publishing to pub.dev via OIDC — no long-lived tokens.
#
# Release one package by pushing a package-prefixed tag, e.g.:
#   git tag leak_graph-v0.1.0 && git push origin leak_graph-v0.1.0
#
# RELEASE ORDER:
#   1. leak_graph          (no inter-package deps)
#   2. radar_trace         (no inter-package deps; pure Dart)
#   3. flutter_leak_radar  (depends on leak_graph: ^0.1.0)
#   4. flutter_leak_radar_lint (standalone lints)
#   5. flutter_perf_radar  (depends on radar_trace: ^0.1.0)
#   6. radar               (depends on flutter_leak_radar + flutter_perf_radar)
#
# Each job runs tool/publish.sh, which strips `resolution: workspace` before
# publishing: the repo keeps that line for local dev (the lint tests need the
# workspace to resolve Flutter), but it breaks pub.dev's package analysis. OIDC
# is provided by `id-token: write` + setup-dart/-flutter; `--force` is
# non-interactive.
#
# Prerequisites (one-time, per package, on pub.dev → Admin → Automated publishing):
#   - Enable "Publishing from GitHub Actions", repo tp9imka/flutter-leak-radar,
#     tag pattern "{{package}}-v{{version}}".
#   - The FIRST-EVER publish of a new package must be done manually
#     (tool/publish.sh) — OIDC automated publishing can only be configured once
#     the package already exists on pub.dev.

on:
  push:
    tags:
      - 'leak_graph-v*'
      - 'flutter_leak_radar-v*'
      - 'flutter_leak_radar_lint-v*'
      - 'radar_trace-v*'
      - 'flutter_perf_radar-v*'
      - 'flutter_radar-v*'

jobs:
  leak_graph:
    if: startsWith(github.ref_name, 'leak_graph-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint the OIDC token pub.dev verifies against the tag
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: ./tool/publish.sh packages/leak_graph --force

  flutter_leak_radar:
    if: startsWith(github.ref_name, 'flutter_leak_radar-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: ./tool/publish.sh packages/flutter_leak_radar --force

  flutter_leak_radar_lint:
    if: startsWith(github.ref_name, 'flutter_leak_radar_lint-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: ./tool/publish.sh packages/flutter_leak_radar_lint --force

  radar_trace:
    if: startsWith(github.ref_name, 'radar_trace-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: ./tool/publish.sh packages/radar_trace --force

  flutter_perf_radar:
    if: startsWith(github.ref_name, 'flutter_perf_radar-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: ./tool/publish.sh packages/flutter_perf_radar --force

  flutter_radar:
    if: startsWith(github.ref_name, 'flutter_radar-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: ./tool/publish.sh packages/flutter_radar --force
