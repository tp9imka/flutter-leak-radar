name: Pages

# Deploy the static marketing site (site/) to GitHub Pages via GitHub Actions.
#
# NOTE: this requires the repo's Pages source to be set to "GitHub Actions"
# (Settings → Pages → Build and deployment → Source). It replaces the legacy
# gh-pages branch source.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yaml'
  workflow_dispatch:

# Least-privilege token + the OIDC id-token deploy-pages verifies against.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deployment; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
