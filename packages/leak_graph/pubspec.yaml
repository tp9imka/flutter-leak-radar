name: leak_graph
description: >-
  Pure-Dart library for loading VM heap snapshots and analysing object
  retaining paths to surface memory leaks.
version: 0.3.0
repository: https://github.com/tp9imka/flutter-leak-radar
issue_tracker: https://github.com/tp9imka/flutter-leak-radar/issues
homepage: https://tp9imka.github.io/flutter-leak-radar/
topics:
  - memory
  - leak-detection
  - heap-snapshot
  - vm-service

executables:
  leak_capture: capture
  # `analyze` does not collide with anything on activation: `dart analyze` is a
  # dart subcommand (never a bare PATH binary), and there is no system
  # `analyze(1)`, so no `leak_analyze` alias is needed.
  analyze: analyze

environment:
  sdk: ">=3.10.0 <4.0.0"

resolution: workspace

dependencies:
  args: ^2.5.0
  meta: ^1.15.0
  vm_service: ^15.0.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
