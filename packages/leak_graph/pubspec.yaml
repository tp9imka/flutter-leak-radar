name: leak_graph
description: >-
  Pure-Dart library for loading VM heap snapshots and analysing object
  retaining paths to surface memory leaks.
version: 0.1.0
repository: https://github.com/tp9imka/flutter-leak-radar
issue_tracker: https://github.com/tp9imka/flutter-leak-radar/issues
homepage: https://github.com/tp9imka/flutter-leak-radar
topics:
  - memory
  - leak-detection
  - heap-snapshot
  - vm-service

environment:
  sdk: ">=3.10.0 <4.0.0"

resolution: workspace

dependencies:
  args: ^2.5.0
  meta: ^1.15.0
  vm_service: ^15.0.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
