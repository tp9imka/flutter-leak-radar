name: flutter_leak_radar_lint
description: >-
  Custom lint rules for Flutter/Dart: undisposed controllers, uncancelled
  subscriptions, discarded listen results, and more memory-leak patterns.
version: 0.1.0
repository: https://github.com/tp9imka/flutter-leak-radar
issue_tracker: https://github.com/tp9imka/flutter-leak-radar/issues
homepage: https://github.com/tp9imka/flutter-leak-radar
topics:
  - lints
  - custom-lint
  - memory
  - leak-detection
  - static-analysis

environment:
  sdk: ">=3.10.0 <4.0.0"

resolution: workspace

dependencies:
  analyzer: ^8.0.0
  custom_lint_builder: ^0.8.1

dev_dependencies:
  bloc: ^9.2.1
  custom_lint: ^0.8.1
  flutter_lints: ^5.0.0
  test: ^1.25.0
