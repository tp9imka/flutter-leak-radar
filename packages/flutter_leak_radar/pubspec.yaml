name: flutter_leak_radar
description: On-device memory-leak detector for Flutter. Tracks per-class heap growth and precise object retention in debug/profile; complete no-op in release.
version: 0.0.1
repository: https://github.com/tp9imka/flutter-leak-radar
issue_tracker: https://github.com/tp9imka/flutter-leak-radar/issues
homepage: https://tp9imka.github.io/flutter-leak-radar/
topics:
  - memory
  - leak-detection
  - debugging
  - devtools
  - performance
environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.0"
resolution: workspace
dependencies:
  flutter:
    sdk: flutter
  vm_service: ^15.0.0
  meta: ^1.15.0
  share_plus: ^13.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk.ttf
    - family: HankenGrotesk
      fonts:
        - asset: assets/fonts/HankenGrotesk.ttf
