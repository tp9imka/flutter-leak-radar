name: radarscope
description: >-
  All-in-one umbrella for the Radar observability suite — one import and one
  init for Flutter memory, performance, and stability, with an overlay badge
  and a unified inspector.
version: 0.1.0
repository: https://github.com/tp9imka/flutter-leak-radar
issue_tracker: https://github.com/tp9imka/flutter-leak-radar/issues
homepage: https://tp9imka.github.io/flutter-leak-radar/
topics:
  - memory
  - performance
  - observability
  - debugging
  - flutter

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_leak_radar: ^0.2.0
  flutter_perf_radar: ^0.1.0
  radar_trace: ^0.1.0
  radar_ui: ^0.1.0
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
