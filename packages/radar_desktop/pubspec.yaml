name: radar_desktop
description: >-
  Standalone macOS-first desktop app for offline heap-dump leak/memory
  analysis, built on radar_workbench + radar_ui.
version: 0.1.0
publish_to: none
repository: https://github.com/tp9imka/flutter-leak-radar

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  radar_workbench: ^0.1.0
  radar_ui: ^0.2.0
  radar_native: ^0.1.0
  radar_native_host: ^0.1.0
  leak_graph: ^0.3.0
  vm_service: ^15.0.0
  window_manager: ^0.5.1
  file_selector: ^1.1.0
  desktop_drop: ^0.7.1
  path_provider: ^2.1.6
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
