name: radar_trace
description: >-
  Pure-Dart tracer framework with monotonic spans, log-linear latency
  histograms, Zone-based async nesting, and a lossless outlier ring.
version: 0.2.0
repository: https://github.com/tp9imka/flutter-leak-radar
issue_tracker: https://github.com/tp9imka/flutter-leak-radar/issues
homepage: https://tp9imka.github.io/flutter-leak-radar/
topics:
  - tracing
  - profiling
  - observability
  - performance
  - dart

environment:
  sdk: ">=3.10.0 <4.0.0"

resolution: workspace

dependencies:
  meta: ^1.15.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
