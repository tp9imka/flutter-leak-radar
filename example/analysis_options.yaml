include: package:flutter_lints/flutter.yaml

analyzer:
  plugins:
    - custom_lint
  errors:
    # Intentional leak patterns in demo code — suppress analyzer noise so that
    # only the custom_lint diagnostics we want to demonstrate are visible.
    unused_field: ignore

linter:
  rules:
    # Disable built-in Dart lints that would fire on intentional leak patterns
    # and duplicate the custom_lint diagnostics.
    cancel_subscriptions: false
    close_sinks: false
