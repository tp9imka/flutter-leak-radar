name: flutter_leak_radar_example
description: >
  Radar suite showcase — live demos of every unified-radar feature:
  leaks, tracing, rebuild counting, frame jank, stability errors, and stalls.
publish_to: none
version: 0.0.1

# Resolves independently (NOT a workspace member) so `dart run custom_lint`
# can bootstrap the local lint plugin. The dependency_overrides below let it
# resolve against unpublished local packages that radar resolves transitively.
environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_radar:
    path: ../packages/flutter_radar
  bloc: ^9.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_leak_radar_lint:
    path: ../packages/flutter_leak_radar_lint
  custom_lint: ^0.8.1
  image: ^4.5.4
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  flutter_radar:
    path: ../packages/flutter_radar
  flutter_leak_radar:
    path: ../packages/flutter_leak_radar
  flutter_perf_radar:
    path: ../packages/flutter_perf_radar
  radar_trace:
    path: ../packages/radar_trace
  leak_graph:
    path: ../packages/leak_graph
  radar_ui:
    path: ../packages/radar_ui

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  image_path: "assets/icon/leak_radar_icon.png"
  android: true
  adaptive_icon_background: "#0A0D0E"
  adaptive_icon_foreground: "assets/icon/leak_radar_foreground.png"
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/icon/leak_radar_icon.png"
